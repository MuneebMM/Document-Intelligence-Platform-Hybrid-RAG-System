server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # -------------------------------------------------------------------------
    # API reverse proxy
    # All /api/ requests are forwarded to the backend container.
    # proxy_read_timeout is generous (300s) to accommodate long-running LLM
    # and embedding calls without nginx cutting the connection early.
    # -------------------------------------------------------------------------
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # -------------------------------------------------------------------------
    # React Router support
    # try_files checks for a real file/directory first, then falls back to
    # index.html so client-side routes work correctly on hard refresh.
    # -------------------------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # -------------------------------------------------------------------------
    # Static asset caching
    # Vite fingerprints asset filenames (e.g. index-A1b2C3.js) so they can
    # be cached aggressively by the browser without stale-content risk.
    # -------------------------------------------------------------------------
    location ~* \.(?:js|css|woff2?|png|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # -------------------------------------------------------------------------
    # Security headers
    # -------------------------------------------------------------------------
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # Compress text responses before sending.
    gzip            on;
    gzip_types      text/plain text/css application/javascript application/json;
    gzip_min_length 256;
}
