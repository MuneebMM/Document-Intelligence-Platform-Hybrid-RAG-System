version: '3.9'

services:

  # ---------------------------------------------------------------------------
  # Qdrant — vector database for dense similarity search
  # ---------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC API
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - app-network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend — FastAPI application (parse → embed → store → query)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override the default localhost value so the backend reaches the
      # qdrant container by its Docker service name.
      - QDRANT_HOST=qdrant
    volumes:
      # Persist BM25 indexes on the host so they survive container restarts
      # and are not lost when the image is rebuilt.
      - ./bm25_indexes:/app/bm25_indexes
      - ./backend/evaluation_results:/app/evaluation_results
    networks:
      - app-network
    depends_on:
      qdrant:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Frontend — nginx serving the React/Vite build, proxying /api/ to backend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:80"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  app-network:
    driver: bridge

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  qdrant_storage:
